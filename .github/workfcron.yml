name: Update ARD Stream Link

on:
  schedule:
    # Runs at minute 0 of every 3rd hour (00:00, 03:00, 06:00, etc. UTC)
    - cron: '0 */3 * * *'
  workflow_dispatch:
    # Allows you to manually trigger the job from the GitHub Actions tab anytime

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    
    permissions:
      # Grants the action permission to push code updates back to the repo
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run extraction script
      run: python update_link.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Stage the updated file
        git add ard.m3u8
        
        # Commit and push only if the stream link actually changed
        if ! git diff --cached --quiet; then
          git commit -m "Automated update of ARD stream link"
          git push
        else
          echo "No changes detected in the stream link. Skipping push."
        fi
